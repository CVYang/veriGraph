agents:
  max_iterations: 3
  timeout_seconds: 3600
  retry_delay: 5

llm:
  provider: DeepSeek
  model: deepseek-v4-pro
  temperature: 0.7
  max_tokens: 128000

rtl:
  output_dir: ./output/rtl
  indent: "  "
  line_width: 512

verification:
  test_dir: ./output/tests
  coverage_threshold: 0.9

pipeline:
  enable_verification: true
  enable_syntax_check: true
  parallel_agents: true